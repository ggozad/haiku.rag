          description: |-
            Search the knowledge base using hybrid search (vector + full-text).

            Returns ranked results with content and metadata. When picture
            content is in the result set and the driving skill model is
            vision-capable, picture bytes are attached as ``BinaryContent``
            parts so the model sees figures alongside text.
          name: search
          parameters:
            additionalProperties: false
            properties:
              limit:
                anyOf:
                - type: integer
                - type: 'null'
                default: null
                description: Maximum number of results.
              query:
                description: The search query.
                type: string
            required:
            - query
            type: object
        type: function
      - function:
          description: List all documents in the knowledge base.
          name: list_documents
          parameters:
            additionalProperties: false
            properties: {}
            type: object
        type: function
      - function:
          description: Retrieve a document by ID, title, or URI.
          name: get_document
          parameters:
            additionalProperties: false
            properties:
              query:
                description: Document ID, title, or URI to look up.
                type: string
            required:
            - query
            type: object
        type: function
      - function:
          description: |-
            Register chunk IDs as citations for your answer.

            Call this after searching, with the chunk_id values from search
            results that support your answer.
          name: cite
          parameters:
            additionalProperties: false
            properties:
              chunk_ids:
                description: List of chunk_id values from search results.
                items:
                  type: string
                type: array
            required:
            - chunk_ids
            type: object
        type: function
