        raw_text: Furthermore, we provide evidence that DocLayNet is of sufficient size. Lastly, we compare models trained
          on PubLayNet, DocBank and DocLayNet, showing that layout predictions of the DocLayNettrained models are more robust
          and thus the preferred choice for general-purpose document-layout analysis.
        text: |-
          ABSTRACT
          Furthermore, we provide evidence that DocLayNet is of sufficient size. Lastly, we compare models trained on PubLayNet, DocBank and DocLayNet, showing that layout predictions of the DocLayNettrained models are more robust and thus the preferred choice for general-purpose document-layout analysis.
