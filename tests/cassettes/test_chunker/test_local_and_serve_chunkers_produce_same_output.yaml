      Pfitzmann, Christoph Auer, Michele Dolfi, Ahmed S. Nassar, and Peter Staar. 2022. DocLayNet: A Large Human-Annotated
      Dataset for DocumentLayout Analysis. In Proceedings of the 28th ACM SIGKDD Conference on Knowledge Discovery and Data
      Mining (KDD '22), August 14-18, 2022, Washington, DC, USA. ACM, New York, NY, USA, 9 pages. https://doi.org/10.1145/
      3534678.3539043\",\"text\":\"Birgit Pfitzmann, Christoph Auer, Michele Dolfi, Ahmed S. Nassar, and Peter Staar. 2022.
      DocLayNet: A Large Human-Annotated Dataset for DocumentLayout Analysis. In Proceedings of the 28th ACM SIGKDD Conference
      on Knowledge Discovery and Data Mining (KDD '22), August 14-18, 2022, Washington, DC, USA. ACM, New York, NY, USA, 9
      pages. https://doi.org/10.1145/ 3534678.3539043\",\"formatting\":null,\"hyperlink\":null},{\"self_ref\":\"#/texts/313\",\"parent\":{\"cref\":\"#/body\"},\"children\":[],\"content_layer\":\"body\",\"meta\":null,\"label\":\"section_header\",\"prov\":[{\"page_no\":1,\"bbox\":{\"l\":53.79800000000006,\"t\":543.3589147999995,\"r\":111.94350300000005,\"b\":534.2915275647053,\"coord_origin\":\"BOTTOMLEFT\"},\"charspan\":[0,8]}],\"orig\":\"ABSTRACT\",\"text\":\"ABSTRACT\",\"formatting\":null,\"hyperlink\":null,\"level\":1},{\"self_ref\":\"#/texts/314\",\"parent\":{\"cref\":\"#/body\"},\"children\":[],\"content_layer\":\"body\",\"meta\":null,\"label\":\"text\",\"prov\":[{\"page_no\":1,\"bbox\":{\"l\":53.467,\"t\":528.6650592,\"r\":295.56019089920005,\"b\":257.84988189215403,\"coord_origin\":\"BOTTOMLEFT\"},\"charspan\":[0,1595]}],\"orig\":\"Accurate
      document layout analysis is a key requirement for highquality PDF document conversion. With the recent availability
      of public, large ground-truth datasets such as PubLayNet and DocBank, deep-learning models have proven to be very effective
      at layout detection and segmentation. While these datasets are of adequate size to train such models, they severely
      lack in layout variability since they are sourced from scientific article repositories such as PubMed and arXiv only.
      Consequently, the accuracy of the layout segmentation drops significantly when these models are applied on more challenging
      and diverse layouts. In this paper, we present DocLayNet , a new, publicly available, document-layout annotation dataset
      in COCO format. It contains 80863 manually annotated pages from diverse data sources to represent a wide variability
      in layouts. For each PDF page, the layout annotations provide labelled bounding-boxes with a choice of 11 distinct classes.
      DocLayNet also provides a subset of double- and triple-annotated pages to determine the inter-annotator agreement. In
      multiple experiments, we provide baseline accuracy scores (in mAP) for a set of popular object detection models. We
      also demonstrate that these models fall approximately 10% behind the inter-annotator agreement. Furthermore, we provide
      evidence that DocLayNet is of sufficient size. Lastly, we compare models trained on PubLayNet, DocBank and DocLayNet,
      showing that layout predictions of the DocLayNettrained models are more robust and thus the preferred choice for general-purpose
      document-layout analysis.\",\"text\":\"Accurate document layout analysis is a key requirement for highquality PDF document
      conversion. With the recent availability of public, large ground-truth datasets such as PubLayNet and DocBank, deep-learning
      models have proven to be very effective at layout detection and segmentation. While these datasets are of adequate size
      to train such models, they severely lack in layout variability since they are sourced from scientific article repositories
      such as PubMed and arXiv only. Consequently, the accuracy of the layout segmentation drops significantly when these
      models are applied on more challenging and diverse layouts. In this paper, we present DocLayNet , a new, publicly available,
      document-layout annotation dataset in COCO format. It contains 80863 manually annotated pages from diverse data sources
      to represent a wide variability in layouts. For each PDF page, the layout annotations provide labelled bounding-boxes
      with a choice of 11 distinct classes. DocLayNet also provides a subset of double- and triple-annotated pages to determine
      the inter-annotator agreement. In multiple experiments, we provide baseline accuracy scores (in mAP) for a set of popular
      object detection models. We also demonstrate that these models fall approximately 10% behind the inter-annotator agreement.
      Furthermore, we provide evidence that DocLayNet is of sufficient size. Lastly, we compare models trained on PubLayNet,
      DocBank and DocLayNet, showing that layout predictions of the DocLayNettrained models are more robust and thus the preferred
      choice for general-purpose document-layout analysis.\",\"formatting\":null,\"hyperlink\":null},{\"self_ref\":\"#/texts/315\",\"parent\":{\"cref\":\"#/body\"},\"children\":[],\"content_layer\":\"body\",\"meta\":null,\"label\":\"section_header\",\"prov\":[{\"page_no\":1,\"bbox\":{\"l\":53.798,\"t\":240.0649148,\"r\":134.81988570000001,\"b\":230.99752756470593,\"coord_origin\":\"BOTTOMLEFT\"},\"charspan\":[0,12]}],\"orig\":\"CCS
