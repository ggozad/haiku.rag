            text: 'Phase 1: Data selection and preparation. Our inclusion criteria for documents were described in Section
              3. A large effort went into ensuring that all documents are free to use. The data sources include publication
              repositories such as arXiv 3 , government offices, company websites as well as data directory services for financial
              reports and patents. Scanned documents were excluded wherever possible because they can be rotated or skewed.
              This would not allow us to perform annotation with rectangular bounding-boxes and therefore complicate the annotation
              process.'
          - children: []
            content_layer: body
