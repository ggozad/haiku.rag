      problem\",\"text\":\"Report problem\",\"formatting\":null,\"hyperlink\":null},{\"self_ref\":\"#/texts/25\",\"parent\":{\"cref\":\"#/body\"},\"children\":[],\"content_layer\":\"body\",\"meta\":null,\"label\":\"text\",\"prov\":[{\"page_no\":1,\"bbox\":{\"l\":66.83668829289999,\"t\":202.94350491369937,\"r\":286.5825451760633,\"b\":166.35403154722667,\"coord_origin\":\"BOTTOMLEFT\"},\"charspan\":[0,231]}],\"orig\":\"we
      distributed the annotation workload and performed continuous quality controls. Phase one and two required a small team
      of experts only. For phases three and four, a group of 40 dedicated annotators were assembled and supervised.\",\"text\":\"we
      distributed the annotation workload and performed continuous quality controls. Phase one and two required a small team
      of experts only. For phases three and four, a group of 40 dedicated annotators were assembled and supervised.\",\"formatting\":null,\"hyperlink\":null},{\"self_ref\":\"#/texts/26\",\"parent\":{\"cref\":\"#/body\"},\"children\":[],\"content_layer\":\"body\",\"meta\":null,\"label\":\"text\",\"prov\":[{\"page_no\":1,\"bbox\":{\"l\":67.1390232626,\"t\":162.9037595004993,\"r\":287.9626972083287,\"b\":136.32422248732667,\"coord_origin\":\"BOTTOMLEFT\"},\"charspan\":[0,193]},{\"page_no\":1,\"bbox\":{\"l\":308.4196836585,\"t\":499.21598036401946,\"r\":528.7591558047571,\"b\":440.64309416372663,\"coord_origin\":\"BOTTOMLEFT\"},\"charspan\":[194,567]}],\"orig\":\"Phase
      1: Data selection and preparation. Our inclusion criteria for documents were described in Section 3. A large effort
      went into ensuring that all documents are free to use. The data sources include publication repositories such as arXiv
      3 , government offices, company websites as well as data directory services for financial reports and patents. Scanned
      documents were excluded wherever possible because they can be rotated or skewed. This would not allow us to perform
      annotation with rectangular bounding-boxes and therefore complicate the annotation process.\",\"text\":\"Phase 1: Data
      selection and preparation. Our inclusion criteria for documents were described in Section 3. A large effort went into
      ensuring that all documents are free to use. The data sources include publication repositories such as arXiv 3 , government
      offices, company websites as well as data directory services for financial reports and patents. Scanned documents were
      excluded wherever possible because they can be rotated or skewed. This would not allow us to perform annotation with
      rectangular bounding-boxes and therefore complicate the annotation process.\",\"formatting\":null,\"hyperlink\":null},{\"self_ref\":\"#/texts/27\",\"parent\":{\"cref\":\"#/body\"},\"children\":[],\"content_layer\":\"body\",\"meta\":null,\"label\":\"text\",\"prov\":[{\"page_no\":1,\"bbox\":{\"l\":308.4196836585,\"t\":437.1928221169994,\"r\":529.2412854606305,\"b\":320.5247713228266,\"coord_origin\":\"BOTTOMLEFT\"},\"charspan\":[0,746]}],\"orig\":\"Preparation
      work included uploading and parsing the sourced PDF documents in the Corpus Conversion Service (CCS) [22], a cloud-native
      platform which provides a visual annotation interface and allows for dataset inspection and analysis. The annotation
      interface of CCS is shown in Figure 3. The desired balance of pages between the different document categories was achieved
      by selective subsampling of pages with certain desired properties. For example, we made sure to include the title page
      of each document and bias the remaining page selection to those with figures or tables. The latter was achieved by leveraging
      pre-trained object detection models from PubLayNet, which helped us estimate how many figures and tables a given page
      contains.\",\"text\":\"Preparation work included uploading and parsing the sourced PDF documents in the Corpus Conversion
      Service (CCS) [22], a cloud-native platform which provides a visual annotation interface and allows for dataset inspection
      and analysis. The annotation interface of CCS is shown in Figure 3. The desired balance of pages between the different
      document categories was achieved by selective subsampling of pages with certain desired properties. For example, we
      made sure to include the title page of each document and bias the remaining page selection to those with figures or
      tables. The latter was achieved by leveraging pre-trained object detection models from PubLayNet, which helped us estimate
      how many figures and tables a given page contains.\",\"formatting\":null,\"hyperlink\":null},{\"self_ref\":\"#/texts/28\",\"parent\":{\"cref\":\"#/body\"},\"children\":[],\"content_layer\":\"body\",\"meta\":null,\"label\":\"text\",\"prov\":[{\"page_no\":1,\"bbox\":{\"l\":308.1164352901,\"t\":317.07449927609946,\"r\":529.2454172963755,\"b\":150.35768011412665,\"coord_origin\":\"BOTTOMLEFT\"},\"charspan\":[0,1159]}],\"orig\":\"Phase
      2: Label selection and guideline. We reviewed the collected documents and identified the most common structural features
      they exhibit. This was achieved by identifying recurrent layout elements and lead us to the definition of 11 distinct
      class labels. These 11 class labels are Caption , Footnote , Formula , List-item , Pagefooter , Page-header , Picture
      , Section-header , Table , Text , and Title . Critical factors that were considered for the choice of these class labels
      were (1) the overall occurrence of the label, (2) the specificity of the label, (3) recognisability on a single page
      (i.e. no need for context from previous or next page) and (4) overall coverage of the page. Specificity ensures that
      the choice of label is not ambiguous, while coverage ensures that all meaningful items on a page can be annotated. We
      refrained from class labels that are very specific to a document category, such as Abstract in the Scientific Articles
      category. We also avoided class labels that are tightly linked to the semantics of the text. Labels such as Author and
      Affiliation , as seen in DocBank, are often only distinguishable by discriminating on\",\"text\":\"Phase 2: Label selection
      and guideline. We reviewed the collected documents and identified the most common structural features they exhibit.
      This was achieved by identifying recurrent layout elements and lead us to the definition of 11 distinct class labels.
      These 11 class labels are Caption , Footnote , Formula , List-item , Pagefooter , Page-header , Picture , Section-header
      , Table , Text , and Title . Critical factors that were considered for the choice of these class labels were (1) the
      overall occurrence of the label, (2) the specificity of the label, (3) recognisability on a single page (i.e. no need
      for context from previous or next page) and (4) overall coverage of the page. Specificity ensures that the choice of
      label is not ambiguous, while coverage ensures that all meaningful items on a page can be annotated. We refrained from
      class labels that are very specific to a document category, such as Abstract in the Scientific Articles category. We
      also avoided class labels that are tightly linked to the semantics of the text. Labels such as Author and Affiliation
      , as seen in DocBank, are often only distinguishable by discriminating on\",\"formatting\":null,\"hyperlink\":null},{\"self_ref\":\"#/texts/29\",\"parent\":{\"cref\":\"#/body\"},\"children\":[],\"content_layer\":\"body\",\"meta\":null,\"label\":\"footnote\",\"prov\":[{\"page_no\":1,\"bbox\":{\"l\":308.4196836585,\"t\":142.38657883377573,\"r\":355.2685865690871,\"b\":135.76320328430165,\"coord_origin\":\"BOTTOMLEFT\"},\"charspan\":[0,20]}],\"orig\":\"3
