            text: Preparation work included uploading and parsing the sourced PDF documents in the Corpus Conversion Service
              (CCS) [22], a cloud-native platform which provides a visual annotation interface and allows for dataset inspection
              and analysis. The annotation interface of CCS is shown in Figure 3. The desired balance of pages between the
              different document categories was achieved by selective subsampling of pages with certain desired properties.
              For example, we made sure to include the title page of each document and bias the remaining page selection to
              those with figures or tables. The latter was achieved by leveraging pre-trained object detection models from
              PubLayNet, which helped us estimate how many figures and tables a given page contains.
          - children: []
